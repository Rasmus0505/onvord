<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onvord</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="bg-layer bg-layer-a"></div>
  <div class="bg-layer bg-layer-b"></div>

  <main class="panel-shell">
    <!-- ① 待机 -->
    <div id="view-idle" class="view active">
      <div class="hero">
        <p class="hero-kicker">BROWSER SOP RECORDER</p>
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="url(#g1)" stroke-width="3" />
            <path d="M18 16L34 24L18 32V16Z" fill="url(#g1)" />
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48">
                <stop offset="0%" stop-color="#2f80ff" />
                <stop offset="100%" stop-color="#0b5fff" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="logo-text">Onvord</h1>
        <p class="tagline">一边操作，一边讲解<br>AI 立即学会流程</p>
      </div>
      <div class="instructions">
        <div class="inst"><span class="inst-n">1</span><span>打开要演示的网页</span></div>
        <div class="inst"><span class="inst-n">2</span><span>点击下方按钮开始录制</span></div>
        <div class="inst"><span class="inst-n">3</span><span>操作浏览器，同时语音讲解</span></div>
        <div class="inst"><span class="inst-n">4</span><span>完成后生成 SOP，发送给 AI</span></div>
      </div>
      <button id="btn-start" class="btn btn-primary btn-lg"><span class="bi">⏺</span>开始录制</button>
      <a href="#" id="link-settings" class="settings-link">设置语音识别 API Key</a>
    </div>

    <!-- ② 录制中 -->
    <div id="view-recording" class="view">
      <div class="rec-bar">
        <div class="rec-ind"><span class="rec-dot"></span><span class="rec-label">录制中</span></div>
        <div id="rec-timer" class="rec-timer">00:00</div>
      </div>
      <div class="section">
        <h3 class="sec-title">语音识别 <span id="vol-indicator" class="vol-indicator"><span class="vol-bar"></span><span
              class="vol-bar"></span><span class="vol-bar"></span><span class="vol-bar"></span><span
              class="vol-bar"></span></span></h3>
        <div id="voice-box" class="voice-box"><span class="placeholder">开始说话…</span></div>
      </div>
      <div class="section grow">
        <h3 class="sec-title">操作记录 <span id="ev-count" class="badge">0</span></h3>
        <div id="ev-list" class="ev-list">
          <div class="placeholder">等待操作…</div>
        </div>
      </div>
      <button id="btn-stop" class="btn btn-danger btn-lg"><span class="bi">⏹</span>停止录制</button>
    </div>

    <!-- ③ SOP 展示 -->
    <div id="view-sop" class="view">
      <div class="sop-head">
        <h2 id="sop-title" class="sop-title">SOP</h2>
        <div class="sop-meta">
          <span id="sop-count" class="badge">0 步骤</span>
          <span id="sop-dur" class="badge badge-s">00:00</span>
        </div>
      </div>
      <div id="sop-steps" class="sop-steps"></div>
      <div class="sop-actions">
        <button id="btn-export" class="btn btn-primary">导出网页</button>
        <button id="btn-redo" class="btn btn-ghost">重新录制</button>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="sidepanel.js"></script>
</body>

</html>
