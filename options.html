<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onvord 设置</title>
    <style>
        :root {
            --bg: #eef3f8;
            --surface: #ffffff;
            --surface-2: #f7fafc;
            --line: #d8e2ec;
            --line-strong: #c5d5e5;

            --text: #102a43;
            --muted: #52667a;
            --muted-soft: #7b8ea4;

            --ac: #0b5fff;
            --ach: #2f80ff;
            --ac-g: rgba(11, 95, 255, 0.2);
            --ok: #1f9d68;
            --dn: #e5484d;

            --f-title: "Nunito Sans", "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --f-body: "Public Sans", "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--f-body);
            background:
                radial-gradient(circle at 92% 5%, rgba(11, 95, 255, 0.13) 0%, transparent 34%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 34px 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        .head {
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 24px rgba(12, 27, 61, 0.08);
            padding: 16px 18px;
            margin-bottom: 14px;
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background: #f4f8fd;
            color: #3c5471;
            padding: 4px 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 10px;
            margin-bottom: 8px;
            font-family: "IBM Plex Mono", "SF Mono", Menlo, monospace;
        }

        h1 {
            font-family: var(--f-title);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 6px;
            color: #113252;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.65;
        }

        .card {
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 24px rgba(12, 27, 61, 0.08);
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #46617e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 11px 12px;
            background: var(--surface-2);
            border: 1px solid #d3e1ef;
            border-radius: 10px;
            color: #173453;
            font-family: var(--f-body);
            font-size: 14px;
            outline: none;
            transition: 150ms ease;
        }

        input:focus,
        select:focus {
            border-color: var(--ac);
            box-shadow: 0 0 0 3px var(--ac-g);
            background: #ffffff;
        }

        input::placeholder {
            color: var(--muted-soft);
        }

        .hint {
            font-size: 12px;
            color: var(--muted-soft);
            margin-top: 6px;
            line-height: 1.65;
        }

        .hint a {
            color: var(--ac);
            text-decoration: none;
        }

        .hint a:hover {
            text-decoration: underline;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid transparent;
            border-radius: 11px;
            font-family: var(--f-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 150ms ease;
        }

        .btn-primary {
            background: linear-gradient(120deg, var(--ac), var(--ach));
            color: #fff;
            box-shadow: 0 10px 20px var(--ac-g);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px var(--ac-g);
        }

        .btn-sec {
            background: #ffffff;
            color: #314b66;
            border-color: #d5e2ef;
        }

        .btn-sec:hover {
            background: #f6f9fd;
            border-color: #c3d6ea;
        }

        .status {
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .status.ok {
            display: block;
            background: rgba(31, 157, 104, 0.08);
            border: 1px solid rgba(31, 157, 104, 0.26);
            color: var(--ok);
        }

        .status.err {
            display: block;
            background: rgba(229, 72, 77, 0.08);
            border: 1px solid rgba(229, 72, 77, 0.26);
            color: var(--dn);
        }

        .toggle-vis {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted-soft);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .toggle-vis:hover {
            color: #173453;
        }

        .input-wrap {
            position: relative;
        }

        .notes {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.8;
        }

        .notes p {
            margin-bottom: 6px;
        }

        .notes p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="head">
            <p class="kicker">Extension Settings</p>
            <h1>Onvord 语音设置</h1>
            <p class="subtitle">Onvord 使用 Deepgram 进行语音识别。请先配置 API Key 后再开始录制。</p>
        </div>

        <div class="card">
            <div class="card-title">语音引擎（Deepgram）</div>
            <div class="field">
                <label for="dg-key">API Key</label>
                <div class="input-wrap">
                    <input type="password" id="dg-key" placeholder="输入你的 Deepgram API Key">
                    <button class="toggle-vis" id="toggle-vis" type="button" title="显示/隐藏">👁️</button>
                </div>
                <div class="hint">
                    免费注册即送 $200 额度 → <a href="https://console.deepgram.com/signup"
                        target="_blank">console.deepgram.com</a>
                    <br>注册后在 API Keys 页面创建一个 Key，粘贴到这里即可。
                </div>
            </div>
            <div class="field">
                <label for="dg-lang">识别语言</label>
                <select id="dg-lang">
                    <option value="zh-CN">中文（普通话）</option>
                    <option value="en-US">English (US)</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-save">保存设置</button>
                <button class="btn btn-sec" id="btn-test">测试连接</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="card">
            <div class="card-title">使用说明</div>
            <div class="notes">
                <p>• Onvord 仅使用 Deepgram 进行语音识别。</p>
                <p>• 未配置 API Key 时，录制按钮会被禁用。</p>
                <p>• 你的 API Key 仅存储在本地浏览器中，不会上传到任何服务器。</p>
            </div>
        </div>
    </div>
    <script src="options.js"></script>
</body>

</html>
