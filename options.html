<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Onvord 设置</title>
    <style>
        :root {
            --bg0: #0c0c14;
            --bg1: #14141f;
            --bg2: #1c1c2b;
            --bg2h: #24243a;
            --tx: #e8e8f0;
            --tx2: #9898b0;
            --tx3: #686880;
            --ac: #6366f1;
            --ac-g: rgba(99, 102, 241, .3);
            --ok: #10b981;
            --dn: #ef4444;
            --bd: rgba(255, 255, 255, .06);
            --bd2: rgba(255, 255, 255, .1);
            --r: 10px;
            --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: var(--f);
            background: var(--bg0);
            color: var(--tx);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased
        }

        .container {
            max-width: 520px;
            width: 100%
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .subtitle {
            color: var(--tx2);
            font-size: 14px;
            margin-bottom: 32px
        }

        .card {
            background: var(--bg2);
            border-radius: 14px;
            border: 1px solid var(--bd);
            padding: 24px;
            margin-bottom: 20px
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .field {
            margin-bottom: 16px
        }

        .field:last-child {
            margin-bottom: 0
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--tx2);
            margin-bottom: 6px;
            font-weight: 500
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg1);
            border: 1px solid var(--bd2);
            border-radius: 8px;
            color: var(--tx);
            font-family: var(--f);
            font-size: 14px;
            outline: none;
            transition: all .2s
        }

        input:focus {
            border-color: var(--ac);
            box-shadow: 0 0 0 3px var(--ac-g)
        }

        input::placeholder {
            color: var(--tx3)
        }

        .hint {
            font-size: 12px;
            color: var(--tx3);
            margin-top: 6px;
            line-height: 1.5
        }

        .hint a {
            color: var(--ac);
            text-decoration: none
        }

        .hint a:hover {
            text-decoration: underline
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: var(--f);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 15px var(--ac-g)
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px var(--ac-g)
        }

        .btn-sec {
            background: var(--bg2h);
            color: var(--tx);
            border: 1px solid var(--bd2)
        }

        .btn-sec:hover {
            background: var(--bg1)
        }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none
        }

        .status.ok {
            display: block;
            background: rgba(16, 185, 129, .1);
            border: 1px solid rgba(16, 185, 129, .3);
            color: var(--ok)
        }

        .status.err {
            display: block;
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            color: var(--dn)
        }

        .toggle-vis {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--tx3);
            cursor: pointer;
            font-size: 16px;
            padding: 4px
        }

        .toggle-vis:hover {
            color: var(--tx)
        }

        .input-wrap {
            position: relative
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚙️ Onvord 设置</h1>
        <p class="subtitle">配置语音识别服务，让录制更智能</p>

        <div class="card">
            <div class="card-title">🎙️ 语音识别（Deepgram）</div>
            <div class="field">
                <label for="dg-key">API Key</label>
                <div class="input-wrap">
                    <input type="password" id="dg-key" placeholder="输入你的 Deepgram API Key">
                    <button class="toggle-vis" id="toggle-vis" title="显示/隐藏">👁️</button>
                </div>
                <div class="hint">
                    免费注册即送 $200 额度 → <a href="https://console.deepgram.com/signup"
                        target="_blank">console.deepgram.com</a>
                    <br>注册后在 API Keys 页面创建一个 Key，粘贴到这里即可。
                </div>
            </div>
            <div class="field">
                <label for="dg-lang">识别语言</label>
                <select id="dg-lang"
                    style="width:100%;padding:10px 14px;background:var(--bg1);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:var(--f);font-size:14px;outline:none">
                    <option value="zh">中文（普通话）</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="multi">多语种自动检测</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-save">💾 保存设置</button>
                <button class="btn btn-sec" id="btn-test">🔍 测试连接</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="card">
            <div class="card-title">💡 说明</div>
            <div style="font-size:13px;color:var(--tx2);line-height:1.8">
                • Onvord 使用 Deepgram 进行实时语音转文字<br>
                • 你的 API Key 仅存储在本地浏览器中，不会上传到任何服务器<br>
                • 如果不配置 API Key，语音识别功能将不可用<br>
                • 未来将支持更多语音引擎（如讯飞等）
            </div>
        </div>
    </div>
    <script src="options.js"></script>
</body>

</html>
